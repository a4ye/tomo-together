name: Build APK

# Builds the signed Android release APK on a GitHub-hosted runner. Expo CNG
# generates the native project, Gradle assembles a signed release, and the
# artifact is published to the App Service via Kudu (served at /apk) and
# uploaded as a workflow artifact. version.json is published only after its
# matching APK so the in-app updater never sees a version ahead of its binary.
on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "assets/**"
      - "plugins/**"
      - "App.tsx"
      - "index.ts"
      - "app.config.ts"
      - "app.json"
      - "package.json"
      - "package-lock.json"
      - "scripts/ci-stamp-version.mjs"
      - ".github/workflows/build-apk.yml"
  workflow_dispatch:

concurrency:
  # Each run publishes version.json only after its APK uploads; queue rather
  # than cancel so an in-flight publish always completes.
  group: build-apk
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # versionCode is the commit count, so the full history is required.
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install dependencies
        run: npm ci

      - name: Stamp version (versionCode = commit count)
        run: node scripts/ci-stamp-version.mjs

      - name: Generate native Android project
        run: EXPO_NO_GIT_STATUS=1 npx expo prebuild --clean --platform android --no-install

      - name: Assemble signed release APK
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          set -euo pipefail
          printf '%s' "$KEYSTORE_B64" | base64 -d > android/app/upload.keystore
          printf '\norg.gradle.parallel=true\norg.gradle.caching=true\norg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g\n' >> android/gradle.properties
          cd android
          chmod +x gradlew
          TOMO_UPLOAD_STORE_FILE=upload.keystore \
          TOMO_UPLOAD_STORE_PASSWORD="$KEYSTORE_PASS" \
          TOMO_UPLOAD_KEY_ALIAS=tomo \
          TOMO_UPLOAD_KEY_PASSWORD="$KEYSTORE_PASS" \
          ./gradlew assembleRelease --no-daemon
          cd ..
          cp android/app/build/outputs/apk/release/app-release.apk tomo-yard.apk

      - name: Publish APK + version to the App Service (Kudu)
        env:
          KUDU_USER: ${{ secrets.KUDU_USER }}
          KUDU_PASS: ${{ secrets.KUDU_PASS }}
        run: |
          set -euo pipefail
          # Ensure the target directory exists (ignore the "already exists" case).
          curl -sf -X PUT -u "$KUDU_USER:$KUDU_PASS" -H 'If-Match: *' \
            'https://ht6-tomoyard.scm.azurewebsites.net/api/vfs/data/apk/' || true
          curl -sf -X PUT --data-binary @tomo-yard.apk -u "$KUDU_USER:$KUDU_PASS" -H 'If-Match: *' \
            'https://ht6-tomoyard.scm.azurewebsites.net/api/vfs/data/apk/tomo-yard.apk'
          # version.json last, so /apk/version never leads its binary.
          curl -sf -X PUT --data-binary @version.json -u "$KUDU_USER:$KUDU_PASS" -H 'If-Match: *' \
            'https://ht6-tomoyard.scm.azurewebsites.net/api/vfs/data/apk/version.json'

      - uses: actions/upload-artifact@v4
        with:
          name: tomo-yard-apk
          path: tomo-yard.apk
