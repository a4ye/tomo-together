name: Build APK

# Builds on the ht6-builder Azure VM (32 cores, persistent gradle daemon +
# caches) instead of the 2-core hosted runner: warm builds in a few minutes.
# The hosted job uploads the current versioned build script, triggers it, and
# streams its logs. This also updates already-provisioned builders whose
# cloud-init custom_data is immutable.
on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "assets/**"
      - "plugins/**"
      - "App.tsx"
      - "index.ts"
      - "app.config.ts"
      - "app.json"
      - "package.json"
      - "package-lock.json"
      - "infra/build-apk-remote.sh"
      - ".github/workflows/build-apk.yml"
  workflow_dispatch:

concurrency:
  # Every ref shares one persistent builder checkout and output location.
  group: build-apk
  # queue builds instead of cancelling: each run publishes version.json, and a
  # cancelled run never gets that far. Under active development the previous
  # cancel-in-progress: true meant no build ever finished.
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Auth0 client configuration is intentionally stored as Actions variables:
      # Expo inlines EXPO_PUBLIC_* values into the client bundle.
      EXPO_PUBLIC_AUTH0_DOMAIN: ${{ vars.EXPO_PUBLIC_AUTH0_DOMAIN }}
      EXPO_PUBLIC_AUTH0_CLIENT_ID: ${{ vars.EXPO_PUBLIC_AUTH0_CLIENT_ID }}
      EXPO_PUBLIC_AUTH0_WEB_CLIENT_ID: ${{ vars.EXPO_PUBLIC_AUTH0_WEB_CLIENT_ID }}
      EXPO_PUBLIC_AUTH0_AUDIENCE: ${{ vars.EXPO_PUBLIC_AUTH0_AUDIENCE }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate public Auth0 build configuration
        shell: bash
        run: |
          : "${EXPO_PUBLIC_AUTH0_DOMAIN:?Set the EXPO_PUBLIC_AUTH0_DOMAIN Actions variable}"
          : "${EXPO_PUBLIC_AUTH0_CLIENT_ID:?Set the EXPO_PUBLIC_AUTH0_CLIENT_ID Actions variable}"
          : "${EXPO_PUBLIC_AUTH0_WEB_CLIENT_ID:?Set the EXPO_PUBLIC_AUTH0_WEB_CLIENT_ID Actions variable}"
          : "${EXPO_PUBLIC_AUTH0_AUDIENCE:?Set the EXPO_PUBLIC_AUTH0_AUDIENCE Actions variable}"

      - name: Azure login (scoped to the builder VM)
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # The 32-core builder is deallocated between builds; boot it on demand.
      # Starting an already-running VM is a no-op, so queued builds are safe.
      - name: Start builder VM
        run: az vm start -g ht6-tomoyard-rg -n ht6-builder

      - name: Write SSH key
        run: |
          install -m 600 /dev/null builder_key
          printf '%s\n' "${{ secrets.BUILDER_SSH_KEY }}" > builder_key

      - name: Wait for builder (SSH + cloud-init toolchain)
        run: |
          for i in $(seq 1 60); do
            ssh -i builder_key -o StrictHostKeyChecking=accept-new -o ConnectTimeout=5 \
              azureuser@${{ secrets.BUILDER_HOST }} 'test -f /opt/build/.ready' && exit 0
            sleep 10
          done
          echo "builder never became ready" >&2; exit 1

      - name: Install current build script on builder
        run: |
          scp -i builder_key -o StrictHostKeyChecking=accept-new \
            infra/build-apk-remote.sh \
            azureuser@${{ secrets.BUILDER_HOST }}:/opt/build/build-ci.sh
          ssh -i builder_key -o StrictHostKeyChecking=accept-new \
            azureuser@${{ secrets.BUILDER_HOST }} \
            'chmod 700 /opt/build/build-ci.sh'

      - name: Build on Azure VM
        env:
          KUDU_USER: ${{ secrets.KUDU_USER }}
          KUDU_PASS: ${{ secrets.KUDU_PASS }}
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # NUL-delimited stdin preserves values literally. The remote command
          # is static, so credentials are neither logged nor evaluated as code.
          printf '%s\0' \
            "$GITHUB_SHA" "$GH_TOKEN" "$KUDU_USER" "$KUDU_PASS" "$KEYSTORE_B64" "$KEYSTORE_PASS" \
            "$EXPO_PUBLIC_AUTH0_DOMAIN" "$EXPO_PUBLIC_AUTH0_CLIENT_ID" \
            "$EXPO_PUBLIC_AUTH0_WEB_CLIENT_ID" "$EXPO_PUBLIC_AUTH0_AUDIENCE" \
            | ssh -i builder_key -o StrictHostKeyChecking=accept-new -o ConnectTimeout=15 \
                azureuser@${{ secrets.BUILDER_HOST }} \
                '/opt/build/build-ci.sh'

      - name: Fetch APK for artifact
        run: scp -i builder_key -o StrictHostKeyChecking=accept-new azureuser@${{ secrets.BUILDER_HOST }}:/opt/build/last.apk tomo-yard.apk

      - uses: actions/upload-artifact@v4
        with:
          name: tomo-yard-apk
          path: tomo-yard.apk

      # Stop the meter even when the build fails. --no-wait: nothing after
      # this needs the VM, and a queued build will just start it again.
      - name: Deallocate builder VM
        if: always()
        run: az vm deallocate --no-wait -g ht6-tomoyard-rg -n ht6-builder
