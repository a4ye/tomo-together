name: Deploy web app

# The web version is exported from the SAME src/ as the Android app on every
# push, so it always stays an exact clone — change code once, both update.
on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "assets/**"
      - "App.tsx"
      - "index.ts"
      - "app.config.ts"
      - "app.json"
      - "plugins/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch:

concurrency:
  group: deploy-web
  cancel-in-progress: true

jobs:
  export:
    runs-on: ubuntu-latest
    env:
      # Expo inlines these public Auth0 identifiers into the web bundle.
      EXPO_PUBLIC_AUTH0_DOMAIN: ${{ vars.EXPO_PUBLIC_AUTH0_DOMAIN }}
      EXPO_PUBLIC_AUTH0_CLIENT_ID: ${{ vars.EXPO_PUBLIC_AUTH0_CLIENT_ID }}
      EXPO_PUBLIC_AUTH0_WEB_CLIENT_ID: ${{ vars.EXPO_PUBLIC_AUTH0_WEB_CLIENT_ID }}
      EXPO_PUBLIC_AUTH0_AUDIENCE: ${{ vars.EXPO_PUBLIC_AUTH0_AUDIENCE }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Validate public Auth0 build configuration
        shell: bash
        run: |
          : "${EXPO_PUBLIC_AUTH0_DOMAIN:?Set the EXPO_PUBLIC_AUTH0_DOMAIN Actions variable}"
          : "${EXPO_PUBLIC_AUTH0_CLIENT_ID:?Set the EXPO_PUBLIC_AUTH0_CLIENT_ID Actions variable}"
          : "${EXPO_PUBLIC_AUTH0_WEB_CLIENT_ID:?Set the EXPO_PUBLIC_AUTH0_WEB_CLIENT_ID Actions variable}"
          : "${EXPO_PUBLIC_AUTH0_AUDIENCE:?Set the EXPO_PUBLIC_AUTH0_AUDIENCE Actions variable}"

      - name: Export react-native-web build
        # EXPO_PUBLIC_* substitutions are Metro transforms, so clear the
        # persistent transform cache whenever producing a deployment bundle.
        run: npx expo export --clear --platform web --output-dir dist

      - name: Zip export
        run: cd dist && zip -qr ../web.zip .

      - name: Upload to App Service (served at ht6-app.icinoxis.net)
        env:
          KUDU_USER: ${{ secrets.KUDU_USER }}
          KUDU_PASS: ${{ secrets.KUDU_PASS }}
        run: |
          # ensure target dir exists, then let the Kudu zip API extract into it
          curl -sf -X PUT -u "$KUDU_USER:$KUDU_PASS" -H "If-Match: *" \
            "https://ht6-tomoyard.scm.azurewebsites.net/api/vfs/data/webapp/" || true
          curl -sf -X PUT --data-binary @web.zip -u "$KUDU_USER:$KUDU_PASS" \
            "https://ht6-tomoyard.scm.azurewebsites.net/api/zip/data/webapp/"
