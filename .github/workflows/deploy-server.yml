name: Deploy server + homepage

on:
  push:
    branches: [main]
    paths:
      - "server/**"
      - ".github/workflows/deploy-server.yml"
  workflow_dispatch:

concurrency:
  group: deploy-server
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install and test server
        working-directory: server
        run: |
          npm ci
          npm test

      # Ship only the app itself; local dev data and node_modules stay out.
      # Oryx installs dependencies on the App Service (SCM_DO_BUILD_DURING_DEPLOYMENT).
      - name: Package server
        run: cd server && zip -r ../server.zip . -x "data/*" -x "node_modules/*"

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ht6-tomoyard
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: server.zip
